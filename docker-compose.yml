volumes:
    blacksmith-data:
        driver: local
services:
    blacksmith-redis:
        image: redis:7-alpine
        healthcheck:
            test: redis-cli ping
            interval: 5s
            timeout: 1s
            retries: 5

    blacksmith-postgres:
        image: postgres:latest
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - blacksmith-data:/var/lib/postgresql
        healthcheck:
            test: pg_isready -U postgres
            start_period: 10s
            timeout: 1s
            retries: 5
            interval: 5s
            
    mini-kali-slim:
        image: mini-kali-slim
        container_name: mini-kali-slim
        restart: unless-stopped
        read_only: true
        tmpfs:
          - /tmp
          - /run
          - /var/tmp
          - /var/log
          - /var/lib
          - /var/lock
          - /var/run
        ports:
          - "9756:9756"
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:9756/health"]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 40s

    blacksmithV1:
        image: blacksmith_v1
        ports:
            - "2024:8000"
        depends_on:
            blacksmith-redis:
                condition: service_healthy
            blacksmith-postgres:
                condition: service_healthy
            mini-kali-slim:
                condition: service_healthy
        volumes:
            - ./blacksmithAI/config.json:/deps/blacksmithAI/config.json:ro
            - ./blacksmithAI/.env:/deps/blacksmithAI/.env:ro
        environment:
            REDIS_URI: redis://blacksmith-redis:6379
            LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
            DATABASE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@blacksmith-postgres:5432/${POSTGRES_DB}?sslmode=disable
            container_uri: http://mini-kali-slim:9756/exec
